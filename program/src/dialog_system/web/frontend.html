<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система генерации диалогов в играх</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0b0f1a;
            --bg-elev: #121826;
            --bg-elev-2: #1a2233;
            --panel: rgba(18, 24, 38, 0.85);
            --border: rgba(99, 102, 241, 0.35);
            --accent: #7c83ff;
            --accent-2: #9f7bff;
            --text: #e5e7eb;
            --muted: #a1a1aa;
            --success: #22c55e;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', 'Arial', sans-serif;
            background: radial-gradient(1200px 600px at 15% 10%, #1b2140 0%, var(--bg) 55%),
                        radial-gradient(900px 500px at 85% 15%, #241a3a 0%, var(--bg) 60%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(10px);
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            padding: 22px;
            min-height: 620px;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 14px;
            border-right: 1px solid var(--border);
            padding-right: 18px;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        h1 {
            color: var(--text);
            font-size: 22px;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        h2 {
            color: var(--text);
            font-size: 16px;
            margin-top: 10px;
            margin-bottom: 8px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 6px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            color: var(--muted);
            font-size: 12px;
            font-weight: 600;
        }

        input, select, textarea {
            background: var(--bg-elev);
            border: 1px solid transparent;
            color: var(--text);
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            transition: border 0.2s, box-shadow 0.2s, background 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124, 131, 255, 0.18);
            background: var(--bg-elev-2);
        }

        button {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border: none;
            color: #0b0f1a;
            padding: 10px 14px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
            font-size: 13px;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(124, 131, 255, 0.35);
            filter: brightness(1.05);
        }

        button:active {
            transform: translateY(0);
        }

        .npc-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .npc-btn {
            padding: 10px;
            background: var(--bg-elev);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            text-align: left;
            transition: all 0.2s;
        }

        .npc-btn:hover {
            background: var(--bg-elev-2);
            border-color: var(--accent);
        }

        .npc-btn.active {
            background: linear-gradient(135deg, rgba(124, 131, 255, 0.25), rgba(159, 123, 255, 0.2));
            color: var(--text);
            border-color: var(--accent);
        }

        .dialogue-area {
            background: var(--bg-elev);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            min-height: 320px;
            max-height: 420px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .dialogue-message {
            margin-bottom: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            animation: slideIn 0.25s ease-in;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-player {
            background: rgba(56, 189, 248, 0.12);
            border-left: 3px solid #38bdf8;
            text-align: right;
        }

        .message-npc {
            background: rgba(167, 139, 250, 0.12);
            border-left: 3px solid #a78bfa;
        }

        .message-speaker {
            font-weight: 700;
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .message-text {
            font-size: 14px;
            line-height: 1.4;
        }

        .input-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        textarea {
            min-height: 60px;
            resize: vertical;
        }

        .status-bar {
            background: var(--bg-elev);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            font-size: 12px;
            color: var(--muted);
        }

        .status-bar.error {
            color: var(--danger);
        }

        .status-bar.info {
            color: var(--accent);
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 8px 10px;
            background: var(--bg-elev);
            border: 1px solid var(--border);
            border-radius: 10px;
        }

        .state-panel {
            background: var(--bg-elev);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            font-size: 12px;
            color: var(--muted);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .state-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .state-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 6px;
            background: rgba(124, 131, 255, 0.15);
            color: var(--text);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #2f3647;
            transition: .2s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .2s;
            border-radius: 50%;
        }

        .switch input:checked + .slider {
            background-color: var(--accent);
        }

        .switch input:checked + .slider:before {
            transform: translateX(20px);
        }

        .quick-actions {
            display: none;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                min-height: auto;
            }

            .sidebar {
                border-right: none;
                border-bottom: 2px solid #00d4ff;
                padding-right: 0;
                padding-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Левая панель -->
        <div class="sidebar">
            <h1>🎮 Система диалогов</h1>

            <div class="input-group">
                <label>ID Сессии:</label>
                <input type="text" id="sessionId" value="session_001" placeholder="session_001">
            </div>

            <div class="input-group">
                <label>Имя персонажа:</label>
                <input type="text" id="playerName" value="Неизвестный" placeholder="Ваше имя">
            </div>

            <button onclick="createSession()">✨ Начать сессию</button>

            <h2>Персонажи</h2>
            <div class="npc-list" id="npcList">
                <p style="color: #999;">Загружаю...</p>
            </div>

            <h2>Фильтр токсичности</h2>
            <div class="toggle-row">
                <span id="toxicityLabel">Включен</span>
                <label class="switch">
                    <input type="checkbox" id="toxicityToggle" onchange="toggleToxicity()">
                    <span class="slider"></span>
                </label>
            </div>

            <h2>Состояние игрока</h2>
            <div class="state-panel">
                <div>Репутация с NPC: <span id="repValue" class="state-badge">0</span></div>
                <div>Отношения с NPC: <span id="relValue" class="state-badge">0</span></div>
                <div>Квесты: <span id="questsValue" class="state-badge">0</span></div>
                <div>Флаги:</div>
                <div class="state-list" id="flagsList">—</div>
            </div>

        </div>

        <!-- Главное содержимое -->
        <div class="main-content">
            <h2 id="currentNpcName">Выберите персонажа</h2>

            <div class="dialogue-area" id="dialogueArea">
                <p style="color: #999; text-align: center; margin: auto;">
                    Выберите персонажа из списка и начните разговор...
                </p>
            </div>

            <div class="input-area">
                <textarea id="playerInput" placeholder="Введите вашу реплику..." 
                          onkeypress="if(event.key==='Enter' && !event.shiftKey) sendMessage()"></textarea>

                <div class="input-row">
                    <button onclick="sendMessage()" style="flex: 1;">↩️ Отправить</button>
                </div>

            </div>

            <div class="status-bar" id="statusBar">
                Готов к диалогу. Версия: 1.0
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:8000/api";
        let currentNpcId = null;
        let sessionId = null;
        let npcHistories = {};
        let npcDisplayNames = {};
        let npcOriginalNames = {};

        // Инициализация при загрузке
        document.addEventListener("DOMContentLoaded", async function() {
            await loadNPCs();
            await loadSettings();
            updateStatus("✅ Готов к работе", "info");
        });

        async function loadSettings() {
            try {
                const response = await fetch(`${API_BASE}/settings`);
                const data = await response.json();
                const toggle = document.getElementById("toxicityToggle");
                const enabled = data.toxicity_filter !== "off";
                toggle.checked = enabled;
                updateToxicityLabel(enabled);
            } catch (error) {
                updateStatus(`❌ Ошибка загрузки настроек: ${error.message}`, "error");
            }
        }

        async function toggleToxicity() {
            const toggle = document.getElementById("toxicityToggle");
            const value = toggle.checked ? "soft" : "off";
            updateToxicityLabel(toggle.checked);
            try {
                const response = await fetch(`${API_BASE}/settings`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ toxicity_filter: value })
                });
                if (!response.ok) {
                    throw new Error("Не удалось обновить настройку");
                }
                updateStatus(`✅ Фильтр: ${value}`, "info");
            } catch (error) {
                updateStatus(`❌ ${error.message}`, "error");
            }
        }

        function updateToxicityLabel(enabled) {
            const label = document.getElementById("toxicityLabel");
            label.textContent = enabled ? "Включен" : "Выключен";
        }

        async function createSession() {
            sessionId = document.getElementById("sessionId").value;
            const playerName = document.getElementById("playerName").value;

            if (!sessionId || !playerName) {
                updateStatus("❌ Введите ID сессии и имя персонажа", "error");
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/session/create`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ session_id: sessionId, player_name: playerName })
                });

                if (response.ok) {
                    const data = await response.json();
                    currentNpcId = null;
                    npcHistories = {};
                    npcDisplayNames = { ...npcOriginalNames };
                    resetNpcButtonNames();
                    clearDialogue();
                    updateStatus(`✅ Сессия создана: ${data.session_id}`, "info");
                    addMessage("system", "Сессия создана. Выберите персонажа.");
                    setNpcButtonsEnabled(true);
                    await refreshState();
                } else {
                    updateStatus("❌ Ошибка создания сессии", "error");
                }
            } catch (error) {
                updateStatus(`❌ ${error.message}`, "error");
            }
        }

        async function loadNPCs() {
            try {
                const response = await fetch(`${API_BASE}/npc/list`);
                const data = await response.json();

                const npcList = document.getElementById("npcList");
                npcList.innerHTML = "";

                data.npcs.forEach(npc => {
                    const btn = document.createElement("button");
                    btn.className = "npc-btn";
                    btn.dataset.npcId = npc.id;
                    npcDisplayNames[npc.id] = npc.name;
                    npcOriginalNames[npc.id] = npc.name;
                    btn.textContent = `${npc.name} (${npc.persona})`;
                    btn.disabled = !sessionId;
                    btn.onclick = () => selectNPC(npc.id, npc.name, btn);
                    npcList.appendChild(btn);
                });
            } catch (error) {
                updateStatus(`❌ Ошибка загрузки NPC: ${error.message}`, "error");
            }
        }

        function selectNPC(npcId, npcName, button = null) {
            if (!sessionId) {
                updateStatus("❌ Сначала создайте сессию", "error");
                return;
            }

            currentNpcId = npcId;
            const displayName = npcDisplayNames[npcId] || npcName;
            document.getElementById("currentNpcName").textContent = `Диалог: ${displayName}`;
            updateStatus(`✅ Выбран персонаж: ${displayName}`, "info");
            renderDialogue(npcId);
            if (!npcHistories[npcId] || npcHistories[npcId].length === 0) {
                addMessage(displayName, "Слушаю вас внимательно...");
            }

            // Визуально выделить кнопку
            document.querySelectorAll(".npc-btn").forEach(btn => btn.classList.remove("active"));
            if (button) {
                button.classList.add("active");
            }
            refreshState();
        }

        async function sendMessage() {
            if (!sessionId) {
                updateStatus("❌ Сначала создайте сессию", "error");
                return;
            }

            if (!currentNpcId) {
                updateStatus("❌ Выберите персонажа", "error");
                return;
            }

            const message = document.getElementById("playerInput").value.trim();
            if (!message) {
                updateStatus("❌ Введите сообщение", "error");
                return;
            }

            addMessage("Player", message, currentNpcId);
            document.getElementById("playerInput").value = "";
            updateStatus("⏳ Генерирую ответ...", "info");

            try {
                const response = await fetch(`${API_BASE}/dialogue/respond`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        session_id: sessionId,
                        npc_id: currentNpcId,
                        action: message
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    updateNpcNameFromResponse(data);
                    addMessage(data.speaker, data.text, currentNpcId);
                    updateStatus(`✅ Ответ: [${data.source}] ${data.intent}`, "info");
                    await refreshState();
                } else {
                    const error = await response.json();
                    updateStatus(`❌ ${error.detail}`, "error");
                }
            } catch (error) {
                updateStatus(`❌ ${error.message}`, "error");
            }
        }

        function updateNpcNameFromResponse(data) {
            const npcId = data?.meta?.npc_id;
            const knownName = data?.meta?.known_name;
            const nameRevealed = data?.meta?.name_revealed;
            if (!npcId || !knownName || !nameRevealed) {
                return;
            }

            npcDisplayNames[npcId] = knownName;
            const button = document.querySelector(`.npc-btn[data-npc-id="${npcId}"]`);
            if (button) {
                const personaMatch = button.textContent.match(/\(([^)]+)\)$/);
                const persona = personaMatch ? personaMatch[1] : "";
                button.textContent = persona ? `${knownName} (${persona})` : knownName;
            }
            if (currentNpcId === npcId) {
                document.getElementById("currentNpcName").textContent = `Диалог: ${knownName}`;
            }
        }

        function resetNpcButtonNames() {
            document.querySelectorAll(".npc-btn").forEach(btn => {
                const npcId = btn.dataset.npcId;
                const name = npcOriginalNames[npcId] || npcDisplayNames[npcId] || "Неизвестный";
                const personaMatch = btn.textContent.match(/\(([^)]+)\)$/);
                const persona = personaMatch ? personaMatch[1] : "";
                btn.textContent = persona ? `${name} (${persona})` : name;
            });
            document.getElementById("currentNpcName").textContent = "Выберите персонажа";
        }

        async function refreshState() {
            if (!sessionId) return;
            try {
                const response = await fetch(`${API_BASE}/state/${sessionId}`);
                const data = await response.json();
                const rep = currentNpcId ? (data.player?.npc_reputation?.[currentNpcId] ?? 0) : 0;
                document.getElementById("repValue").textContent = rep;

                const rel = currentNpcId ? (data.player?.relationships?.[currentNpcId] ?? 0) : 0;
                document.getElementById("relValue").textContent = rel;

                const quests = data.player?.active_quests?.length ?? 0;
                document.getElementById("questsValue").textContent = quests;

                const flagsList = document.getElementById("flagsList");
                const flags = data.flags || {};
                const flagKeys = Object.keys(flags).filter(k => flags[k]);
                if (flagKeys.length === 0) {
                    flagsList.textContent = "—";
                } else {
                    flagsList.innerHTML = "";
                    flagKeys.forEach(key => {
                        const div = document.createElement("div");
                        div.textContent = key;
                        flagsList.appendChild(div);
                    });
                }
            } catch (error) {
                updateStatus(`❌ Ошибка состояния: ${error.message}`, "error");
            }
        }

        function addMessage(speaker, text, npcId = currentNpcId) {
            const dialogueArea = document.getElementById("dialogueArea");
            const msgDiv = document.createElement("div");
            msgDiv.className = speaker === "Player" ? "dialogue-message message-player" : "dialogue-message message-npc";

            msgDiv.innerHTML = `
                <div class="message-speaker">${escapeHtml(speaker)}</div>
                <div class="message-text">${escapeHtml(text)}</div>
            `;

            dialogueArea.appendChild(msgDiv);
            dialogueArea.scrollTop = dialogueArea.scrollHeight;

            if (npcId) {
                if (!npcHistories[npcId]) {
                    npcHistories[npcId] = [];
                }
                npcHistories[npcId].push({ speaker, text });
            }
        }

        function clearDialogue() {
            const dialogueArea = document.getElementById("dialogueArea");
            dialogueArea.innerHTML = '<p style="color: #999; text-align: center; margin: auto;">Новый диалог...</p>';
        }

        function renderDialogue(npcId) {
            const dialogueArea = document.getElementById("dialogueArea");
            dialogueArea.innerHTML = "";

            const history = npcHistories[npcId] || [];
            if (history.length === 0) {
                dialogueArea.innerHTML = '<p style="color: #999; text-align: center; margin: auto;">Диалог пуст. Напишите сообщение...</p>';
                return;
            }

            history.forEach(item => {
                const msgDiv = document.createElement("div");
                msgDiv.className = item.speaker === "Player" ? "dialogue-message message-player" : "dialogue-message message-npc";
                msgDiv.innerHTML = `
                    <div class="message-speaker">${escapeHtml(item.speaker)}</div>
                    <div class="message-text">${escapeHtml(item.text)}</div>
                `;
                dialogueArea.appendChild(msgDiv);
            });

            dialogueArea.scrollTop = dialogueArea.scrollHeight;
        }

        function setNpcButtonsEnabled(enabled) {
            document.querySelectorAll(".npc-btn").forEach(btn => {
                btn.disabled = !enabled;
                if (!enabled) {
                    btn.classList.remove("active");
                }
            });
        }

        function updateStatus(message, type = "info") {
            const statusBar = document.getElementById("statusBar");
            statusBar.textContent = message;
            statusBar.className = `status-bar ${type}`;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
